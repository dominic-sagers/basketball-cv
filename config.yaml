# basketball-cv configuration
# All tunable parameters live here — never hardcoded in source files.
# See docs/architecture.md for full field descriptions.

# ---------------------------------------------------------------------------
# Video sources
# Each entry is one camera/stream. Supported types: "file", "rtsp", "usb"
#
# file  → pre-recorded video for development/testing
# rtsp  → live network stream (RTSP URL)
# usb   → locally attached USB or built-in camera
# ---------------------------------------------------------------------------
sources:
  - name: "basket_1"
    type: "file"
    path: "store/footage/basket_1.mp4"
    loop: true             # loop file for repeated testing
    team: "A"              # team this camera covers

  - name: "basket_2"
    type: "file"
    path: "store/footage/basket_2.mp4"
    loop: true
    team: "B"

# RTSP example (swap in when cameras are live):
#   - name: "basket_1"
#     type: "rtsp"
#     url: "rtsp://192.168.1.100:554/stream1"
#     reconnect_delay: 3.0    # seconds between reconnect attempts
#     connect_timeout: 10.0   # seconds to wait for initial connection
#     team: "A"
#
#   - name: "basket_2"
#     type: "rtsp"
#     url: "rtsp://192.168.1.101:554/stream1"
#     reconnect_delay: 3.0
#     connect_timeout: 10.0
#     team: "B"

# USB example:
#   - name: "basket_1"
#     type: "usb"
#     index: 0
#     resolution: [1920, 1080]
#     fps: 30
#     team: "A"

# ---------------------------------------------------------------------------
# Detection model
# Switch `backend` between "yolo" and "rfdetr" to change the detection engine.
# All other pipeline code is backend-agnostic — only this section changes.
# ---------------------------------------------------------------------------
model:
  backend: "yolo"              # "yolo" | "rfdetr"

  # --- YOLOv11 (active) ---
  weights: "store/weights/basketball-ft.pt"   # fine-tuned on basketball-detection-srfkd (9,599 imgs, 50 epochs)
  # weights: "yolo11m.pt"                     # COCO baseline — 14.8% ball detection, 48.5 FPS
  input_size: 960              # 1280 → ~26 FPS, 960 → ~48 FPS on RTX 4080S

  # --- RF-DETR-L (swap in when fine-tuned) ---
  # weights: "store/weights/basketball-rfdetr-l/best.pth"
  # input_size: 560            # RF-DETR native resolution — 560 or 640

  device: 0                    # GPU index (0 = first GPU); "cpu" for CPU-only
  confidence: 0.4
  iou_threshold: 0.5
  class_map:
    0: "Ball"
    1: "Ball_in_Basket"
    2: "Player"
    3: "Basket"
    4: "Player_Shooting"

# ---------------------------------------------------------------------------
# Training
# Set `backend` to "yolo" or "rfdetr" to select the training engine.
# Each backend reads its own fields; unused fields are ignored.
#
# Known datasets (all stored in store/dataset/):
#   basketball-srfkd        — YOLO format  (Roboflow export: YOLOv11)
#   basketball-srfkd-coco   — COCO format  (Roboflow export: COCO JSON) — required for RF-DETR
#                             mAP50=0.956, ball=0.943, basket=0.979 (50 epochs, yolo11m)
# ---------------------------------------------------------------------------
training:
  backend: "yolo"              # "yolo" | "rfdetr"

  # --- YOLOv11 training ---
  dataset: "store/dataset/basketball-srfkd/data.yaml"   # YOLO-format data.yaml
  base_model: "yolo11m.pt"    # starting weights; swap for a .pt to continue fine-tuning
  epochs: 50
  imgsz: 960
  batch: 8                    # 8 = safe for 16GB VRAM at imgsz=960; 16 causes OOM
  device: 0
  output_name: "basketball-ft"    # weights saved to store/weights/<output_name>/

  # --- RF-DETR-L training (uncomment and set backend: "rfdetr" to use) ---
  # dataset: "store/dataset/basketball-srfkd-coco"  # COCO-format dir (train/ + val/ with annotations.json)
  # base_model: "rfdetr-l"    # "rfdetr-l" downloads pretrained weights automatically
  # epochs: 50
  # batch: 4                  # 4 = safe for 16GB VRAM; use grad_accum to simulate larger batches
  # grad_accum: 4             # effective batch size = batch * grad_accum = 16
  # lr: 1e-4
  # device: 0
  # output_name: "basketball-rfdetr-l"   # weights saved to store/weights/<output_name>/

# ---------------------------------------------------------------------------
# Multi-object tracking (ByteTrack)
# ---------------------------------------------------------------------------
tracking:
  tracker: "bytetrack"
  track_high_thresh: 0.25
  track_low_thresh: 0.1
  track_buffer: 30             # frames to keep a lost track alive

# ---------------------------------------------------------------------------
# Court geometry
# ---------------------------------------------------------------------------
court:
  width_ft: 94
  height_ft: 50
  homography_points: []        # filled after camera calibration

# ---------------------------------------------------------------------------
# Event detection thresholds (all tunable without touching source code)
# ---------------------------------------------------------------------------
event_logic:
  rebound_proximity_px: 80     # player must be within this radius at possession change
  shot_downward_frames: 3      # frames ball must travel downward through hoop zone
  assist_possession_window: 5  # seconds — look-back window for last pass
  block_hand_ball_dist_px: 40  # max hand-to-ball distance to count as a block

# ---------------------------------------------------------------------------
# Highlight maker (src/highlight_maker.py)
# ---------------------------------------------------------------------------
highlights:
  pre_seconds: 8               # seconds of footage before each basket
  post_seconds: 5              # seconds of footage after each basket
  min_gap_seconds: 3           # events within this gap are merged into one clip
  out_dir: null                # null = <raw_video_dir>/highlights/

# ---------------------------------------------------------------------------
# Output
# ---------------------------------------------------------------------------
output:
  log_dir: "store/output/"
  scoreboard_display: 1        # monitor index for Phase 1.5 scoreboard overlay
